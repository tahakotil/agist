name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill in as much detail as you can.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click Wake on an agent, nothing happens..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to /agents
        2. Click Wake on any agent
        3. See error in console
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Dashboard
        - API
        - CLI
        - Scheduler
        - Adapters
        - Database
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Agist version
      placeholder: "v0.5.0"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or logs
      render: shell
